<!DOCTYPE html>
<head>
    <meta charset="utf-8">
    <link rel='stylesheet' href='style.css'>
    <link rel='stylesheet' href='box_style.css'>
</head>
<html lang='japanese'>
    <body>
        <div class='top_io_bar' id="top_io_bar">
            暗号化・復号化ツール2.0
            <button type="button" onclick='saveBtnClicked()'>保存</button>
            <input type="file" name="" id="file_input" accept=".cip" />
            注意：未実装、バグあり
            <a href="https://github.com/subeyugi/ciphertoolgui/blob/main/readme.md" target="_blank">使い方はこちら</a><br><br>
            <span class='top_half'>
                <h8>入力文</h8>
                <button id="copyButton" onclick='inputCopyBtnClicked()'>コピー</button>
                <span class='top_id' id='top_input_id'>A1</span>
                <span class='top_error' id='top_input_message'></span>
                <br>
                <textarea id='input_text' class='top_text' spellcheck='false' resize='inTextareaResized()', changed="inputBoxChanged()"></textarea>
            </span>
            <span class='top_half'>
                <h8>出力文</h8>
                <button id="copyButton" onclick='outputCopyBtnClicked()'>コピー</button>
                <span class='top_id' id='top_output_id'></span>
                <span class='top_error' id='top_output_message'></span><br>
                <textarea id='output_text' class='top_text' spellcheck='false' readonly='readonly'></textarea>
            </span>
        </div>

        <div class="main_area" id="main_area">
            <div id='cursor' class='cursorBox'>Move</div>
        </div>

        <script src='src/class.js'></script>
        <script src="lib/encoding.min.js"></script>
        <script src='cipher_convert/converter.js'></script>
        <script src="cipher_convert/morseConverter.js"></script>
        <script src="cipher_convert/stringConverter.js"></script>
        <script src="cipher_convert/twoTouchConverter.js"></script>
        <script src="cipher_convert/caesarConverter.js"></script>
        <script src="cipher_convert/mikakaConverter.js"></script>
        <script src="cipher_convert/calcConverter.js"></script>
        <script src="cipher_convert/charcodeConverter.js"></script>
        <script src="cipher_convert/reverseConverter.js"></script>
        <script src="cipher_convert/baseConverter.js"></script>
        <script src="cipher_convert/charNumberConverter.js"></script>
        <script src="cipher_convert/atbashConverter.js"></script>
        <script src="cipher_convert/vigenereConverter.js"></script>
        <script src="cipher_convert/dakutenConverter.js"></script>
        <script src="cipher_convert/tenjiConverter.js"></script>
        <script src="cipher_convert/polybiusConverter.js"></script>
        <script src="src/errorIndication.js"></script>
        <script src='src/init.js'></script>
        <script src="src/script.js"></script>
    </body>
</html>
